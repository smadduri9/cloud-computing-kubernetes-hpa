apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-eval-hpa
  namespace: hpa-eval
  labels:
    app: hpa-eval
    experiment: hpa
spec:
  # Starts at 1 replica — HPA will scale up/down based on CPU utilization
  replicas: 1
  selector:
    matchLabels:
      app: hpa-eval
      experiment: hpa
  template:
    metadata:
      labels:
        app: hpa-eval
        experiment: hpa
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: hpa-eval-app
          image: gcr.io/PROJECT_ID/hpa-eval-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
